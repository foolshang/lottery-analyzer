name: Auto Lottery

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'predict or results'
        required: true
        default: 'predict'
      force:
        description: 'skip calendar check (true/false)'
        required: false
        default: 'false'

jobs:
  run:
    name: Auto Lottery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install script dependencies
        run: npm install --prefix scripts

      - name: Determine mode
        id: mode
        run: |
          MANUAL="${{ github.event.inputs.mode }}"
          if [ -n "$MANUAL" ]; then
            echo "mode=$MANUAL" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 2 * * *" ]; then
            echo "mode=predict" >> "$GITHUB_OUTPUT"
          else
            echo "mode=results" >> "$GITHUB_OUTPUT"
          fi

      - name: Check - is tomorrow a lottery draw day?
        if: steps.mode.outputs.mode == 'predict'
        id: check_predict
        run: |
          FORCE="${{ github.event.inputs.force }}"
          if [ "$FORCE" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "drawDate=$(TZ='Asia/Bangkok' date -d 'tomorrow' '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"
            echo "force mode - skipping calendar check"
          else
            TOMORROW=$(TZ='Asia/Bangkok' date -d 'tomorrow' '+%Y-%m-%d')
            echo "tomorrow=$TOMORROW"
            if grep -qF "$TOMORROW" lottery-dates.txt; then
              echo "run=true" >> "$GITHUB_OUTPUT"
              echo "drawDate=$TOMORROW" >> "$GITHUB_OUTPUT"
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Check - is today a lottery draw day?
        if: steps.mode.outputs.mode == 'results'
        id: check_results
        run: |
          FORCE="${{ github.event.inputs.force }}"
          if [ "$FORCE" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "force mode - skipping calendar check"
          else
            TODAY=$(TZ='Asia/Bangkok' date '+%Y-%m-%d')
            echo "today=$TODAY"
            if grep -qF "$TODAY" lottery-dates.txt; then
              echo "run=true" >> "$GITHUB_OUTPUT"
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Fetch hints from kapook
        if: steps.mode.outputs.mode == 'predict' && steps.check_predict.outputs.run == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/fetch-hints.js

      - name: Run prediction
        if: steps.mode.outputs.mode == 'predict' && steps.check_predict.outputs.run == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/predict.js

      - name: Send prediction to Discord
        if: steps.mode.outputs.mode == 'predict' && steps.check_predict.outputs.run == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node scripts/discord.js predict

      - name: Fetch results from myhora
        if: steps.mode.outputs.mode == 'results' && steps.check_results.outputs.run == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/fetch-results.js

      - name: Send results to Discord
        if: steps.mode.outputs.mode == 'results' && steps.check_results.outputs.run == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node scripts/discord.js results
