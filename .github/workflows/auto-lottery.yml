name: Auto Lottery

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'predict or results'
        required: true
        default: 'predict'
      force:
        description: 'skip all guards (true/false)'
        required: false
        default: 'false'

jobs:
  run:
    name: Auto Lottery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install script dependencies
        run: npm install --prefix scripts

      - name: Determine mode
        id: mode
        run: |
          MANUAL="${{ github.event.inputs.mode }}"
          if [ -n "$MANUAL" ]; then
            echo "mode=$MANUAL" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 2 * * *" ]; then
            echo "mode=predict" >> "$GITHUB_OUTPUT"
          else
            echo "mode=results" >> "$GITHUB_OUTPUT"
          fi

      # ── PREDICT FLOW ──────────────────────────────────────────────────────
      - name: Decide predict (Thairath + 2-day window + dedup)
        id: decide
        if: steps.mode.outputs.mode == 'predict'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FORCE: ${{ github.event.inputs.force }}
        run: node scripts/draw-date.js

      - name: Run prediction
        if: steps.mode.outputs.mode == 'predict' && steps.decide.outputs.send == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DRAW_DATE: ${{ steps.decide.outputs.drawDate }}
        run: node scripts/predict.js

      - name: Send prediction to Discord
        if: steps.mode.outputs.mode == 'predict' && steps.decide.outputs.send == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node scripts/discord.js predict

      # ── RESULTS FLOW ──────────────────────────────────────────────────────
      - name: Fetch results from myhora
        id: results
        if: steps.mode.outputs.mode == 'results'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FORCE: ${{ github.event.inputs.force }}
        run: node scripts/fetch-results.js

      - name: Send results to Discord
        if: steps.mode.outputs.mode == 'results' && steps.results.outputs.send == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node scripts/discord.js results
