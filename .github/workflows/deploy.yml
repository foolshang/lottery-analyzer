name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]
    paths:
      - 'versions/**.jsx'
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.*'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Detect latest version and copy to src/App.jsx
        run: |
          mkdir -p versions
          LATEST=$(ls versions/lottery-app-v*.jsx 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$LATEST" ]; then
            echo "❌ No version file found in versions/ folder"
            echo "Please upload lottery-app-vN.jsx to versions/ folder"
            exit 1
          fi
          echo "✅ Using version file: $LATEST"
          cp "$LATEST" src/App.jsx
          echo "Copied to src/App.jsx"
          head -5 src/App.jsx
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: lottary-d8ebd